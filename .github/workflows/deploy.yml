name: Build and Push to AWS ECR 

on:
  push:
    branches:
      - main  # <--- CORREGIDO: Ahora escucha a tu rama real
  workflow_dispatch: 

jobs:
  deploy:
    name: Build & Publish Image
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # PARTE 1: Compilamos apuntando a rodrigo-muyu
   # PARTE 1
    - name: Build and Tag Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: rodrigo-muyu
        IMAGE_TAG: build-${{ github.run_number }} # <--- CAMBIA ESTO AQUÍ
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

    # PARTE 2 (TRIVY)
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.login-ecr.outputs.registry }}/rodrigo-muyu:build-${{ github.run_number }} # <--- Y AQUÍ
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    # PARTE 3
    - name: Push Image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: rodrigo-muyu
        IMAGE_TAG: build-${{ github.run_number }} # <--- Y AQUÍ TAMBIÉN
      run: |
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
